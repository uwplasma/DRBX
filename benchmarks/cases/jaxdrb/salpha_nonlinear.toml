# Minimal jax_drb run mirroring Hermes-3 s-alpha (isothermal + vorticity)

[geometry]
kind = "axisymmetric_analytic"
model = "salpha"

nx = 32
ny = 32
nz = 16

Lx = 1.0
Ly = 1.0
Lz = 6.283185307179586

q = 2.0
R0 = 2.0
r0 = 0.2
epsilon = 0.1
shat = 1.0
alpha = 0.0
curvature_model = "logB"
B0 = 1.0
epsilon_x_grad = 0.5
theta_ballooning_on = true
linear_shear_on = true
theta_scale = 2.0
open_field_line = false

bc_x = "periodic"
bc_y = "periodic"

[physics]
omega_n = 1.0
# Approximate Hermes minimal physics (isothermal + vorticity)
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0

[transport]
Dn = 0.0
DOmega = 0.0
DTe = 0.0

[initial]
amplitude = 1e-6
seed = 1
