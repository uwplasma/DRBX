# Aligned jax_drb s-alpha run (GBS/Hermes baseline alignment)

[normalization]
enabled = true
mode = "physics"
Te0_eV = 1.0     # Hermes/GBS Tnorm
Ti0_eV = 1.0
n0 = 1.0e18      # Hermes Nnorm
B0 = 1.0         # Hermes Bnorm
m_i_amu = 2.0
Z_i = 1
length_unit = "lref"
Lref_m = 1.0

[geometry]
kind = "axisymmetric"
coeff_path = "benchmarks/cases/jaxdrb/hermes_salpha_coeffs.npz"

nx = 32
ny = 32
nz = 16

open_field_line = false
bc_x = "neumann"
bc_y = "periodic"
bc_value_x = 0.0
bc_value_y = 0.0
bc_grad_x = 0.0
bc_grad_y = 0.0

[physics]
omega_n = 0.0
log_n = false
log_Te = false
alpha_Te_ohm = 0.0
alpha_Ti_ohm = 0.0
# Approximate Hermes minimal physics (isothermal + vorticity)
nonlinear_on = false
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0

[transport]
Dn = 2.0e-2
DOmega = 2.0e-2
DTe = 2.0e-2
Dvpar = 2.0e-2

[initial]
n_profile = "gaussian_mixmode"
n_profile_amp = 1.0e-1
n_profile_width = 1.0
n_profile_x0 = 0.0
mixmode_amp = 1.0e-5
mixmode_seed = 0.5
mixmode_terms = ["z", "4z-x"]
x_mode = "bout"
x_centered = false
z_mode = "bout"
Te0 = 5.0
amplitude = 0.0
noise_mode = "physical"
noise_fields = ["n"]
seed = 1

[numerics]
poisson = "cg_fd"
bracket = "arakawa"

[bc]
bc_enforce_nu = 0.0
bc_enforce_nu_phi = 1.0e6

[bc.n]
bc_x = "neumann"
bc_y = "periodic"

[bc.Te]
bc_x = "neumann"
bc_y = "periodic"

[bc.omega]
bc_x = "neumann"
bc_y = "periodic"

[bc.phi]
bc_x = "neumann"
bc_y = "periodic"

[bc.vpar_e]
bc_x = "neumann"
bc_y = "periodic"

[bc.vpar_i]
bc_x = "neumann"
bc_y = "periodic"

[time]
method = "rk4_imex_strang"
dt = 1.0e-3
t_end = 20.0
nsteps = 20000
save_every = 10
progress = false
diag_mode = "basic"
poisson_warm_start = true
