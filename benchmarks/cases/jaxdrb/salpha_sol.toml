# s-alpha SOL alignment case (open-field-line + Gaussian source)

[normalization]
enabled = true
mode = "physics"
Te0_eV = 1.0
Ti0_eV = 1.0
n0 = 1.0
B0 = 1.0
m_i_amu = 2.0
Z_i = 1
length_unit = "lref"
Lref_m = 1.0

[geometry]
kind = "axisymmetric_analytic"
model = "salpha"

nx = 16
ny = 8
nz = 16

Lx = 1.0
Ly = 1.0
Lz = 1.0

q = 2.0
R0 = 2.0
r0 = 0.2
epsilon = 0.3
shat = 1.0
alpha = 0.0
curvature_model = "logB"
B0 = 1.0
epsilon_x_grad = 0.5
theta_ballooning_on = true
linear_shear_on = true
theta_scale = 2.0
open_field_line = true
sheath_windows = [[-3.14159265359, -1.57079632679], [1.57079632679, 3.14159265359]]
sheath_sign = [-1.0, 1.0]

bc_x = "neumann"
bc_y = "periodic"
bc_value_x = 0.0
bc_value_y = 0.0
bc_grad_x = 0.0
bc_grad_y = 0.0

[physics]
omega_n = 5.0
log_n = true
log_Te = true
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 2.0

[transport]
Dn = 1.0e-3
DOmega = 1.0e-3
DTe = 1.0e-3
Dvpar = 1.0e-3

[closures.sol]
sol_on = true
sol_xs = 0.5
sol_width = 0.05
sol_open_left = false
sol_n_core = 1.0
sol_n_sol = 0.2
sol_Te_core = 1.0
sol_Te_sol = 0.2
sol_relax_core = 0.2
sol_relax_open = 0.6
sol_source_n0 = 1.0e-2
sol_source_Te0 = 1.0e-2
sol_source_xs = 0.2
sol_source_width = 0.1
sol_source_mask = "closed"
sol_source_y_taper = 0.0

[closures.sheath]
sheath_on = true
sheath_bc_on = true
sheath_bc_model = "simple"

[bc]
bc_enforce_nu = 0.0
bc_enforce_nu_phi = 1.5e2

[bc.n]
bc_x = "neumann"
bc_y = "periodic"

[bc.Te]
bc_x = "neumann"
bc_y = "periodic"

[bc.omega]
bc_x = "dirichlet"
bc_y = "periodic"

[bc.phi]
bc_x = "dirichlet"
bc_y = "periodic"

[bc.vpar_e]
bc_x = "neumann"
bc_y = "periodic"

[bc.vpar_i]
bc_x = "neumann"
bc_y = "periodic"

[initial]
amplitude = 1e-3
seed = 1

[time]
method = "rk4_scan"
dt = 5.0e-5
nsteps = 4000
save_every = 20
diag_mode = "basic"
poisson_warm_start = true
