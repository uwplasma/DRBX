# s-alpha SOL alignment case (open-field-line + Gaussian source)

[normalization]
enabled = true
mode = "physics"
Te0_eV = 1.0
Ti0_eV = 1.0
n0 = 1.0e18
B0 = 1.0
m_i_amu = 2.0
Z_i = 1
length_unit = "lref"
Lref_m = 1.0

[geometry]
kind = "axisymmetric_analytic"
model = "salpha"

nx = 16
ny = 8
nz = 16

Lx = 1.0
Ly = 1.0
Lz = 1.0

q = 2.0
R0 = 2.0
r0 = 0.2
epsilon = 0.3
shat = 1.0
alpha = 0.0
curvature_model = "logB"
B0 = 1.0
epsilon_x_grad = 0.5
theta_ballooning_on = true
linear_shear_on = true
theta_scale = 2.0
open_field_line = true

bc_x = "neumann"
bc_y = "neumann"
bc_value_x = 0.0
bc_value_y = 0.0
bc_grad_x = 0.0
bc_grad_y = 0.0

[physics]
omega_n = 1.0
log_n = true
log_Te = true
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0

[transport]
Dn = 1.0e-2
DOmega = 1.0e-2
DTe = 1.0e-2
Dvpar = 1.0e-2

[closures.sol]
sol_on = true
sol_relax_core = 0.0
sol_relax_open = 0.0
sol_source_n0 = 0.1
sol_source_Te0 = 0.0
sol_source_xs = 0.2
sol_source_width = 0.1
sol_source_mask = "all"
sol_source_y_taper = 0.0

[closures.sheath]
sheath_on = true
sheath_bc_on = true
sheath_bc_model = "simple"

[boundary_policy]
default_nu = 1.0

[[boundary_policy.regions]]
name = "closed"
theta_window = [-1.57079632679, 1.57079632679]

[[boundary_policy.regions]]
name = "leg"
theta_windows = [[-3.14159265359, -1.57079632679], [1.57079632679, 3.14159265359]]

[bc]
bc_enforce_nu = 0.0
bc_enforce_nu_phi = 1.5e2

[bc.n]
bc_x = "neumann"
bc_y = "neumann"

[bc.Te]
bc_x = "neumann"
bc_y = "neumann"

[bc.omega]
bc_x = "dirichlet"
bc_y = "dirichlet"

[bc.phi]
bc_x = "dirichlet"
bc_y = "dirichlet"

[bc.vpar_e]
bc_x = "neumann"
bc_y = "neumann"

[bc.vpar_i]
bc_x = "neumann"
bc_y = "neumann"

[initial]
amplitude = 1e-6
seed = 1

[time]
method = "rk4_scan"
dt = 1.0e-4
nsteps = 2000
save_every = 20
diag_mode = "basic"
poisson_warm_start = true
