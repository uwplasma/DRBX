[geometry]
kind = "salpha"
nx = 24
ny = 24
nz = 8
Lx = 1.0
Ly = 1.0
Lz = 6.283185307179586
bc_x = "dirichlet"
bc_y = "dirichlet"
open_field_line = false
curvature_model = "vector_xy"

[physics]
em_on = false
hot_ion_on = false
nonlinear_on = false
boussinesq = false
non_boussinesq_perturbed_density_on = true
curvature_on = true

[numerics]
perp_operator = "fd"
poisson = "cg_fd"
polarization_preconditioner = "fd_fft"
term_schedule_preset = "benchmark_linear"

[initial]
n0 = 1.0
noise_amplitude = 0.1
noise_fields = ["n"]

[time]
method = "rk4_scan"
dt = 1e-3
nsteps = 200
save_every = 20
diag_mode = "basic"
carry_phi = true
poisson_warm_start = true
progress = false
