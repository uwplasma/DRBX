[normalization]
enabled = true
mode = "physics"
Te0_eV = 50.0
Ti0_eV = 50.0
n0 = 1e+19
B0 = 1.0
m_i_amu = 2.0
Z_i = 1.0
length_unit = "rho_s"

[geometry]
kind = "axisymmetric"
coeff_path = "examples/open_field_line/axisym_tokamak_bxcv_hermes_norm_parcurv.npz"
bc_x = "neumann"
bc_y = "periodic"
open_field_line = true
dealias = true
nx = 32
ny = 81
nz = 48
theta_scale = 1.0

[geometry_physical]
Lx = 0.054697793193735585
Ly = 1.2566370614359172
Lz = 9.22842842
R0 = 1.5
r_minor = 0.054697793193735585

[physics]
nonlinear_on = true
em_on = false
hot_ion_on = true
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 0.023
curvature_Te_coeff = 0.216
curvature_model = "vector_xy"
diamagnetic_on = true
diamagnetic_current_on = true
diamagnetic_current_scale = 1.0
diamagnetic_polarisation_on = true
diamagnetic_polarisation_scale = 0.002
diamag_form_profile = "x*(1-x)"
diamag_density_model = "electron"
sol_on = false
sol_relax_core = 0.001
sol_relax_open = 0.005
sol_n_core = 1.82
sol_n_sol = 1.2
sol_Te_core = 0.61
sol_Te_sol = 0.4
sol_sink_open_n = 0.0
sol_sink_open_Te = 0.0
sol_parallel_loss_on = true
sol_parallel_loss_model = "bohm_exp"
sol_parallel_loss_coeff = 0.35
sol_Te_floor = 0.05
source_on = true
source_profile = "gaussian_xy"
source_x_mode = "bout"
source_only_in_core = true
source_x0 = 0.05
source_y0 = 0.0
source_width_x = 0.05
source_width_y = 99.0
source_Te_is_pressure = true

[physics_physical]
omega_n = 0.0
omega_Te = 0.0
source_n0 = 5.459934898887874e+25
source_Te0 = 1.1494599787132366e+08

[closures]
sheath_on = true
sheath_bc_on = true
sheath_bc_model = "bohm_current"
sheath_nu_factor = 1.0

[transport]
Dn = 0.0
DOmega = 0.0
DTe = 0.0
Dn4 = 0.0
DOmega4 = 0.0
DTe4 = 0.0
mu_lin_n = 0.001
mu_lin_omega = 0.001
mu_lin_Te = 0.001

[numerics]
poisson = "cg_fd"
poisson_metric_on = true
bracket = "arakawa"
parallel_flux_conservative = true
parallel_limiter = "mc"
parallel_momentum_model = "conservative"
exb_advection_form = "flux"
exb_advect_conservative = true
exb_y_scale = 1.0
poisson_scale = -0.00065

[initial]
n0 = 0.0
Te0 = 0.0
n_profile = "linear_x"
n_profile_offset = 3.0
n_profile_slope = -2.7
n_profile_xref = 0.0
p_profile = "parabolic_x"
p_profile_a0 = 3.0
p_profile_a1 = -5.4
p_profile_a2 = 2.43
p_profile_xref = 0.0
Te_pressure_consistent = true
x_mode = "bout"
z_mode = "bout"
n_mixmode_amp = 0.001
n_mixmode_terms = ["x-z"]
n_mixmode_mode = "bout"
n_mixmode_seed = 0.5
amplitude = 0.0

[time]
method = "rk4_imex_strang"
dt = 5e-05
nsteps = 4000
save_every = 10
diag_mode = "full"
save_fields = true
snapshot_fields = [
    "n",
    "omega",
    "Te",
    "phi",
]
poisson_warm_start = true
return_numpy = true

[bc.perp]
bc_x = "neumann"
bc_y = "periodic"
