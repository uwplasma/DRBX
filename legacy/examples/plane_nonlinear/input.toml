[geometry]
kind = "plane"
nx = 128
ny = 128
Lx = 20.0
Ly = 20.0
bc_x = "periodic"
bc_y = "periodic"

[physics]
omega_n = 9.0
omega_Te = 4.5
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0
curvature_model = "tokamak"
curvature_theta_scale = 3.183098861
source_on = true
source_profile = "gaussian_xy"
source_n0 = 2.4
source_Te0 = 0.9
source_x0 = 6.0
source_y0 = 10.0
source_width_x = 1.6
source_width_y = 3.0

[closures]
sheath_on = false
sheath_bc_on = false

[transport]
Dn = 1.0e-3
DOmega = 1.0e-3
DTe = 1.0e-3
Dn4 = 2.0e-6
DOmega4 = 2.0e-6
DTe4 = 2.0e-6
mu_lin_n = 2.5e-3
mu_lin_omega = 1.2e-3
mu_lin_Te = 2.5e-3

[numerics]
poisson = "spectral"
bracket = "arakawa"

[initial]
amplitude = 3.0e-3
seed = 0
noise_mode = "state"
noise_fields = ["n", "omega", "Te"]

[time]
method = "rk4_scan"
dt = 2.0e-3
nsteps = 5000
save_every = 30
diag_mode = "full"
poisson_warm_start = true
return_numpy = true
