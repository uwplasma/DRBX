# Analytic s-alpha geometry roughly aligned with Hermes-3 salpha.nc parameters

[geometry]
kind = "axisymmetric_analytic"
model = "salpha"

# Match Hermes grid resolution
nx = 32
ny = 32
nz = 32

# Perp domain lengths are arbitrary for curvature-only checks
Lx = 1.0
Ly = 1.0

# Parallel domain length and scaling to match theta_ballooning width
Lz = 6.283185307179586
q = 2.0
R0 = 2.0
r0 = 0.2
epsilon = 0.1
shat = 1.0
alpha = 0.0
curvature0 = 0.1
curvature_model = "logB"
B0 = 1.0
epsilon_x_grad = 0.5
theta_ballooning_on = true
linear_shear_on = true
theta_scale = 2.0
open_field_line = false

bc_x = "periodic"
bc_y = "periodic"

[physics]
curvature_on = true
nonlinear_on = true
boussinesq = true

[numerics]
perp_operator = "spectral"
poisson = "spectral"
