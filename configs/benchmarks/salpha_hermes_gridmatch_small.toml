# Small analytic s-alpha config aligned with Hermes-style grid parameters

[geometry]
kind = "axisymmetric_analytic"
model = "salpha"

# Small grid for quick analytic vs grid comparisons
nx = 8
ny = 8
nz = 32

Lx = 1.0
Ly = 1.0
Lz = 6.283185307179586

q = 2.0
R0 = 2.0
r0 = 0.2
epsilon = 0.1
shat = 1.0
alpha = 0.0
curvature_model = "logB"
B0 = 1.0
epsilon_x_grad = 0.5
theta_ballooning_on = true
linear_shear_on = true
theta_scale = 2.0
open_field_line = false

bc_x = "periodic"
bc_y = "periodic"

[physics]
curvature_on = true
nonlinear_on = false
boussinesq = true
