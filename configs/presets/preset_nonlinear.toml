[geometry]
kind = "salpha"
nx = 24
ny = 24
nz = 8
Lx = 1.0
Ly = 1.0
Lz = 6.283185307179586
bc_x = "periodic"
bc_y = "periodic"
open_field_line = false
curvature_model = "vector_xy"

[physics]
