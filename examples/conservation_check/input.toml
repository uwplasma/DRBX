[geometry]
kind = "plane"
nx = 64
ny = 64
Lx = 10.0
Ly = 10.0
bc_x = "periodic"
bc_y = "periodic"

[physics]
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = false
omega_n = 0.0
omega_Te = 0.0
source_on = false
sol_on = false

[transport]
Dn = 0.0
DOmega = 0.0
DTe = 0.0
Dn4 = 0.0
DOmega4 = 0.0
DTe4 = 0.0
mu_lin_n = 0.0
mu_lin_omega = 0.0
mu_lin_Te = 0.0

[numerics]
poisson = "spectral"
bracket = "arakawa"

[terms]
term_schedule = ["advection"]

[initial]
amplitude = 2.0e-3
seed = 0
noise_mode = "state"
noise_fields = ["n", "omega", "Te"]

[time]
method = "rk4_scan"
dt = 2.0e-3
nsteps = 800
save_every = 10
diag_mode = "basic"
poisson_warm_start = true
return_numpy = true
