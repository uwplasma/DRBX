# Open-field ES/cold/Bouss benchmark with Hermes-equivalent initial condition:
#   n(x,z) = 3.0 - 2.7*x + 1e-3*mixmode(x-z)
#   p(x)   = 3.0*(1-0.9*x)^2
#   Te     = p / n

[normalization]
enabled = true
mode = "physics"
Te0_eV = 50.0
Ti0_eV = 50.0
n0 = 1.0e19
B0 = 1.0
m_i_amu = 2.0
Z_i = 1.0
length_unit = "rho_s"

[geometry]
kind = "axisymmetric"
coeff_path = "examples/open_field_line/axisym_tokamak_bxcv.npz"
bc_x = "neumann"
bc_y = "periodic"
open_field_line = true
dealias = true
nx = 36
ny = 48
nz = 48
Lx = 0.054697793193735585
Ly = 9.424777960769383
Lz = 9.22842842
theta_scale = 1.0
R0 = 1.5
r_minor = 0.054697793193735585

[physics]
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0
curvature_model = "vector_xy"
sol_on = false
sol_parallel_loss_on = true
sol_parallel_loss_model = "bohm_exp"
sol_parallel_loss_coeff = 0.35
sol_Te_floor = 0.05
source_on = true
source_profile = "gaussian_xy"
source_x_mode = "bout"
source_only_in_core = true
source_x0 = 0.05
source_y0 = 0.0
source_width_x = 0.05
source_width_y = 99.0

[physics_physical]
omega_n = 1957.4302701188247
omega_Te = 978.7151350594124
source_n0 = 1.4368249733915457e24
source_Te0 = 2.8736499467830916e6

[closures]
sheath_on = true
sheath_bc_on = true
sheath_bc_model = "bohm_current"
sheath_nu_factor = 1.0
sol_sheath_phi_dissipation_on = true

[transport]
Dn = 0.001
DOmega = 0.0001
DTe = 0.001
Dn4 = 5e-08
DOmega4 = 1e-08
DTe4 = 5e-08
mu_lin_n = 0.001
mu_lin_omega = 0.001
mu_lin_Te = 0.001
phi_dissipation_on = true
core_vorticity_damping_on = true

[numerics]
poisson = "cg_fd"
bracket = "arakawa"
parallel_flux_conservative = true
parallel_limiter = "mc"
parallel_use_sheath_targets = true
exb_y_scale = 0.0
poisson_scale = 2.0e-4

[initial]
n0 = 0.0
Te0 = 0.0
x_mode = "bout"
z_mode = "bout"
n_profile = "linear_x"
n_profile_offset = 3.0
n_profile_slope = -2.7
n_profile_xref = 0.0
n_mixmode_amp = 0.001
n_mixmode_terms = ["x-z"]
n_mixmode_mode = "bout"
n_mixmode_seed = 0.5
p_profile = "parabolic_x"
p_profile_a0 = 3.0
p_profile_a1 = -5.4
p_profile_a2 = 2.43
p_profile_xref = 0.0
Te_profile = "from_pressure"
Te_pressure_consistent = true
amplitude = 0.0
seed = 1
noise_mode = "physical"
noise_fields = ["n"]

[time]
method = "rk4_imex_strang"
dt = 0.00005
nsteps = 4000
save_every = 10
diag_mode = "full"
save_fields = true
snapshot_fields = ["n", "omega", "Te", "phi"]
poisson_warm_start = true
return_numpy = true

[bc]
perp = { bc_x = "neumann", bc_y = "periodic" }
