# Stage-A Hermes parity baseline:
# - Exact Hermes-like initial condition (Ne and pressure-derived Te)
# - Open-field sheath, ES/cold/Bouss
# - Curvature from bxcv-converted coefficients
# - Reduced perpendicular transport to avoid non-Hermes baseline diffusion

[normalization]
enabled = true
mode = "physics"
Te0_eV = 50.0
Ti0_eV = 50.0
n0 = 1.0e19
B0 = 1.0
m_i_amu = 2.0
Z_i = 1.0
length_unit = "rho_s"

[geometry]
kind = "axisymmetric"
coeff_path = "examples/open_field_line/axisym_tokamak_bxcv_hermes_norm_parcurv_g22.npz"
bc_x = "neumann"
bc_y = "periodic"
open_field_line = true
dealias = true
nx = 32
# Match Hermes toroidal resolution (MZ) and zperiod for binormal length.
ny = 81
nz = 48
theta_scale = 1.0

#[geometry_physical]
# Lx/Ly/Lz can be provided in physical units. For Hermes parity we use the
# normalized geometry directly from the coefficient file.
#Lx = 0.054697793193735585
# Torodial extent = 2π / zperiod (zperiod = 5).
#Ly = 1.2566370614359172
#Lz = 9.22842842
#R0 = 1.5
#r_minor = 0.054697793193735585

[physics]
nonlinear_on = true
em_on = false
hot_ion_on = true
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 20.0
curvature_model = "vector_xy"
curvature_Te_coeff = 0.04
curvature_n_coeff = 0.14
diamagnetic_on = true
diamagnetic_current_on = true
diamagnetic_polarisation_on = true
diamag_form_profile = "x*(1-x)"
me_hat = 0.0002723311546840958
average_atomic_mass = 2.0
diamagnetic_current_energy_on = false
sol_on = false
sol_parallel_loss_on = true
sol_parallel_loss_model = "bohm_exp"
sol_parallel_loss_coeff = 0.35
sol_Te_floor = 0.05
source_on = true
source_profile = "gaussian_xy"
source_x_mode = "bout"
source_only_in_core = true
source_x0 = 0.05
source_y0 = 0.0
source_width_x = 0.05
source_width_y = 99.0
source_Te_is_pressure = true

[physics_physical]
omega_n = 0.0
omega_Te = 0.0
source_n0 = 3.018304651245823e21
source_Te0 = 2.5098599999999997e4

[closures]
sheath_on = true
sheath_bc_on = true
sheath_bc_model = "bohm_current"
sheath_nu_factor = 1.0
sol_sheath_phi_dissipation_on = true

[transport]
Dn = 0.0
DOmega = 0.0
DTe = 0.05
chi_par_Te = 0.0
Dn4 = 0.0
DOmega4 = 0.0
DTe4 = 0.0
mu_lin_n = 0.0
mu_lin_omega = 0.0
mu_lin_Te = 0.0
phi_dissipation_on = true
core_vorticity_damping_on = true
low_n_diffuse_perp_on = true
low_n_diffuse_perp_coeff = 1.0

[numerics]
poisson = "cg_fd"
bracket = "arakawa"
exb_advection_form = "flux"
exb_advect_conservative = true
parallel_flux_conservative = true
parallel_limiter = "mc"
parallel_flux_scheme = "lax"
parallel_use_sheath_targets = true
exb_y_scale = 1.0
parallel_sign = 1.0
dpar_factor_scale = 1.0
use_gpar_flux = true
parallel_transform = "shifted"
poisson_b_weighted = true
poisson_metric_on = true
poisson_scale = 90.0
poisson_b_weighted_mode = "hermes"
poisson_split_n0 = true
diamagnetic_flux_scheme = "fv"
diamagnetic_use_jacobian = true
perp_operator = "fd"

[initial]
n0 = 0.0
Te0 = 0.0
x_mode = "bout"
z_mode = "bout"
n_profile = "linear_x"
n_profile_offset = 3.0
n_profile_slope = -2.7
n_profile_xref = 0.0
n_mixmode_amp = 0.001
n_mixmode_terms = ["x-z"]
n_mixmode_mode = "bout"
n_mixmode_seed = 0.5
p_profile = "parabolic_x"
p_profile_a0 = 3.0
p_profile_a1 = -5.4
p_profile_a2 = 2.43
p_profile_xref = 0.0
Te_profile = "from_pressure"
Te_pressure_consistent = true
Ti_profile = "from_pressure"
amplitude = 0.0
seed = 1
noise_mode = "physical"
noise_fields = ["n"]

[time]
method = "rk4_imex_strang"
dt = 0.00002
nsteps = 4000
save_every = 20
diag_mode = "full"
save_fields = true
snapshot_fields = ["n", "omega", "Te", "phi"]
poisson_warm_start = true
return_numpy = true
jit = true
stiff_solver = "analytic"

[bc]
perp = { bc_x = "neumann", bc_y = "periodic" }

[bc_physical]
phi_boundary_timescale = 1e-6
