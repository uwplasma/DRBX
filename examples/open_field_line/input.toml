[geometry]
kind = "plane"
nx = 128
ny = 128
Lx = 1.0
Ly = 6.283185307179586
bc_x = "periodic"
bc_y = "periodic"
R0 = 3.0
r_minor = 1.0
dealias = true

[physics]
omega_n = 6.0
omega_Te = 3.0
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0
curvature_model = "tokamak"
curvature_theta_scale = 1.0

# SOL-like open/closed mask and parallel losses.
sol_on = true
sol_xs = 0.7
sol_width = 0.05
sol_open_left = false
sol_n_core = 1.0
sol_n_sol = 0.2
sol_Te_core = 1.0
sol_Te_sol = 0.2
sol_relax_core = 0.3
sol_relax_open = 1.2
sol_sink_open_n = 0.1
sol_sink_open_Te = 0.1
sol_parallel_loss_on = false
sol_sheath_phi_on = false
sol_sheath_omega_on = false

# Volumetric source to seed blobs in the core region.
source_on = true
source_profile = "gaussian_xy"
source_n0 = 1.6
source_Te0 = 0.5
source_x0 = 0.4
source_y0 = 1.57
source_width_x = 0.25
source_width_y = 0.8

[closures]
sheath_on = false
sheath_bc_on = false

[transport]
Dn = 1.5e-3
DOmega = 1.5e-3
DTe = 1.5e-3
Dn4 = 4.0e-6
DOmega4 = 4.0e-6
DTe4 = 4.0e-6
mu_lin_n = 4.0e-3
mu_lin_omega = 2.0e-3
mu_lin_Te = 4.0e-3

[numerics]
poisson = "spectral"
bracket = "arakawa"

[initial]
n0 = 1.0
Te0 = 1.0
amplitude = 6.0e-3
seed = 1
noise_mode = "state"
noise_fields = ["n", "omega", "Te"]

[time]
method = "rk4_scan"
dt = 1.5e-3
nsteps = 3200
save_every = 20
diag_mode = "full"
poisson_warm_start = true
return_numpy = true
