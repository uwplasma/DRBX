[geometry]
kind = "salpha"
nx = 64
ny = 64
nz = 32
Lx = 12.0
Ly = 12.0
Lz = 6.283185307179586
bc_x = "periodic"
bc_y = "periodic"
open_field_line = false
shat = 0.8
alpha = 0.0
q = 1.4
R0 = 3.0
epsilon = 0.18
curvature0 = 0.18
curvature_model = "vector_xy"
theta_scale = 1.0

[physics]
omega_n = 10.0
omega_Te = 5.0
nonlinear_on = true
em_on = false
hot_ion_on = false
neutrals_on = false
boussinesq = true
curvature_on = true
curvature_coeff = 1.0
source_on = true
source_profile = "gaussian_xy"
source_n0 = 2.5
source_Te0 = 1.0
source_x0 = 4.0
source_y0 = 6.0
source_width_x = 2.0
source_width_y = 3.5

[closures]
sheath_on = false
sheath_bc_on = false

[transport]
Dn = 6.0e-4
DOmega = 6.0e-4
DTe = 6.0e-4
Dn4 = 1.5e-6
DOmega4 = 1.5e-6
DTe4 = 1.5e-6
mu_lin_n = 1.5e-3
mu_lin_omega = 8.0e-4
mu_lin_Te = 1.5e-3

[numerics]
poisson = "spectral"
bracket = "arakawa"

[initial]
amplitude = 1.0e-2
seed = 2
noise_mode = "state"
noise_fields = ["n", "omega", "Te"]

[time]
method = "rk4_scan"
dt = 1.0e-3
nsteps = 4800
save_every = 30
diag_mode = "full"
poisson_warm_start = true
return_numpy = true
