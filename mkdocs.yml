site_name: DKX
site_description: JAX-native drift-reduced Braginskii edge and scrape-off-layer plasma solver
site_url: https://dkx.readthedocs.io/
repo_url: https://github.com/uwplasma/dkx
repo_name: uwplasma/dkx
edit_uri: blob/main/docs/
docs_dir: docs
site_dir: site
exclude_docs: |
  data/**
theme:
  name: readthedocs
markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
validation:
  nav:
    omitted_files: info
  links:
    not_found: info
    unrecognized_links: info
    anchors: warn
    absolute_links: info
nav:
  - Home: index.md
  - User Guide:
      - Installation: installation.md
      - Feature Reference: feature_reference.md
      - Inputs And Outputs: input_output_reference.md
      - Native Runtime CLI: native_runtime_cli.md
      - Restartable Diffusion Tutorial: restartable_diffusion_tutorial.md
      - Examples And Artifacts: examples.md
  - Tutorials:
      - Turbulence From Zero: tutorial_hasegawa_wakatani.md
      - Open SOL, Neutrals, Detachment: tutorial_open_sol.md
      - Stellarator FCI Turbulence: tutorial_stellarator_fci.md
  - Physics And Numerics:
      - Models And Equations: models_and_equations.md
      - Solvers And Design: solvers_and_design.md
      - Physics Models: physics_models.md
      - Equation To Code Map: equation_to_code_map.md
      - Code Structure: code_structure.md
      - Performance And Differentiability: performance_and_differentiability.md
      - Autodiff And Scaling Examples: autodiff_and_scaling_examples.md
      - Profiling Runtime: profiling_runtime.md
  - Geometry:
      - Connection Length: connection_length.md
      - Stellarator Examples: stellarator_examples.md
      - Stellarator FCI Validation: stellarator_fci_validation.md
      - Differentiable FCI Flux Tube: stellarator_fci_differentiable.md
      - Rotating-Ellipse FCI: rotating_ellipse_fci.md
      - Open-Field-Line SOL: open_field_line_sol.md
      - Neutrals and Recycling: neutrals_recycling.md
      - Stellarator Turbulence: stellarator_turbulence.md
      - VMEC Extender Edge Fields: vmec_extender_edge_fields.md
      - ESSOS Field-Line Import: essos_fieldline_import.md
      - ESSOS Imported FCI Validation: essos_imported_fci_validation.md
      - Non-Axisymmetric SOL Plan: non_axisymmetric_stellarator_sol_plan.md
  - Validation:
      - Validation Gallery: validation_gallery.md
      - Fluid 1D MMS Convergence: fluid_1d_mms_convergence.md
  - Benchmarks And Movies:
      - Linear Dispersion Benchmark: linear_dispersion_benchmark.md
      - Drift-Wave Turbulence: drift_wave_turbulence.md
  - Plans And Release:
      - Testing Strategy: testing_strategy.md
      - Research-Grade Execution Plan: research_grade_execution_plan.md
      - Geometry Roadmap: geometry_roadmap.md
      - Release Packaging: release_packaging.md
      - Release Notes 2.0.0.dev0: release_notes_2_0_0_dev0.md
