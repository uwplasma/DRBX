site_name: JAXDRB
site_description: JAX-native drift-reduced Braginskii edge and scrape-off-layer plasma solver
site_url: https://jax-drb.readthedocs.io/
repo_url: https://github.com/uwplasma/jax_drb
repo_name: uwplasma/jax_drb
edit_uri: blob/main/docs/
docs_dir: docs
site_dir: site
exclude_docs: |
  data/**
  release_artifacts_manifest.json
theme:
  name: readthedocs
markdown_extensions:
  - admonition
  - fenced_code
  - tables
  - toc:
      permalink: true
validation:
  nav:
    omitted_files: info
  links:
    not_found: info
    unrecognized_links: info
    anchors: warn
    absolute_links: info
