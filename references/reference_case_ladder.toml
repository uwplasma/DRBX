[[case]]
name = "evolve_density_rhs"
stage = "stage2"
reference_path = "tests/integrated/evolve_density/data/BOUT.inp"
parity_mode = "one_rhs"
rationale = "Smallest typed-species density evolution case with analytic source."
compare_variables = ["Ne"]

[[case]]
name = "diffusion_one_step"
stage = "stage2"
reference_path = "tests/integrated/diffusion/data/BOUT.inp"
parity_mode = "one_step"
rationale = "Finite-volume transport and boundary bookkeeping without full multi-physics."
compare_variables = ["Nh", "Ph"]

[[case]]
name = "diffusion_short_window"
stage = "stage2"
reference_path = "tests/integrated/diffusion/data/BOUT.inp"
parity_mode = "short_window"
rationale = "Repeated finite-volume transport steps before moving to more coupled electrostatic cases."
compare_variables = ["Nh", "Ph"]

[[case]]
name = "fluid_1d_mms_rhs"
stage = "stage4"
reference_path = "tests/integrated/1D-fluid/data/BOUT.inp"
parity_mode = "one_rhs"
rationale = "Manufactured-solution RHS parity for density, pressure, and momentum operators before transient checks."
compare_variables = ["ddt(Ni)", "ddt(Pi)", "ddt(NVi)"]
extra_overrides = ["i:diagnose=true"]
trim_y_guards = true

[[case]]
name = "fluid_1d_mms_one_step"
stage = "stage4"
reference_path = "tests/integrated/1D-fluid/data/BOUT.inp"
parity_mode = "one_step"
rationale = "Single-step coupled fluid parity after locking the manufactured RHS."
compare_variables = ["Ni", "Pi", "NVi"]

[[case]]
name = "vorticity_short_window"
stage = "stage4"
reference_path = "tests/integrated/vorticity/data/BOUT.inp"
parity_mode = "short_window"
rationale = "Early electrostatic potential and vorticity closure parity."
compare_variables = ["Vort", "phi"]

[[case]]
name = "vorticity_rhs"
stage = "stage4"
reference_path = "tests/integrated/vorticity/data/BOUT.inp"
parity_mode = "one_rhs"
rationale = "Discrete electrostatic vorticity RHS parity before transient comparisons."
compare_variables = ["ddt(Vort)"]
extra_overrides = ["vorticity:diagnose=true"]

[[case]]
name = "vorticity_one_step"
stage = "stage4"
reference_path = "tests/integrated/vorticity/data/BOUT.inp"
parity_mode = "one_step"
rationale = "Single-output electrostatic vorticity and potential parity."
compare_variables = ["Vort", "phi"]

[[case]]
name = "neutral_mixed_short_window"
stage = "stage7"
reference_path = "tests/integrated/neutral_mixed/data/BOUT.inp"
parity_mode = "short_window"
rationale = "Neutral coupling and reaction bookkeeping."
compare_variables = ["Nh", "Nd", "Pd", "Td"]

[[case]]
name = "fluid_1d_mms"
stage = "stage4"
reference_path = "tests/integrated/1D-fluid/data/BOUT.inp"
parity_mode = "short_window"
rationale = "Pressure and momentum evolution with MMS sources and exact manufactured fields."
compare_variables = ["Ni", "Pi", "NVi"]

[[case]]
name = "drift_wave_short_window"
stage = "stage6"
reference_path = "tests/integrated/drift-wave/data/BOUT.inp"
parity_mode = "short_window"
rationale = "Electrostatic drift-wave parity before longer turbulence runs."
compare_variables = ["Ni", "NVi", "Pe", "Vort"]

[[case]]
name = "recycling_1d_long"
stage = "stage5"
reference_path = "tests/integrated/1D-recycling/data/BOUT.inp"
parity_mode = "long_run"
rationale = "Sheath and recycling parity in open-field geometry."
compare_variables = ["Nd+", "Pd+", "NVd+", "Nd", "Pd", "Pe"]

[[case]]
name = "blob2d_short_window"
stage = "stage6"
reference_path = "examples/other/blob2d/BOUT.inp"
parity_mode = "short_window"
rationale = "2D blob convection with recalc-metric path and sheath closure."
compare_variables = ["Ne", "Vort", "phi"]

[[case]]
name = "tokamak_tcv_x21_escalation"
stage = "stage8"
reference_path = "examples/tokamak-3D/tcv-x21/data/BOUT.inp"
parity_mode = "long_run"
rationale = "Late-stage 3D X-point and turbulence reference case."
compare_variables = ["Ne", "Pe", "Pi", "NVi", "phi"]
