name: coverage

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  whole-package-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      JAX_DRB_USE_FIXTURE_REFERENCE_ROOT: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov
      - name: Whole-package coverage (honest baseline; 95% enforced after Phase 1)
        run: |
          pytest -q -m "not slow" --cov=jax_drb --cov-branch --cov-report=term
