name: coverage

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  whole-package-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      DKX_USE_FIXTURE_REFERENCE_ROOT: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov
      - name: Whole-package coverage (honest baseline; 95% enforced after Phase 1)
        # Two invocations with --cov-append: the heavy FCI stack runs in a
        # separate process so its multi-GB peak does not stack with the main
        # suite, while coverage still accumulates into one whole-package number.
        run: |
          pytest -q -m "not slow" --cov=dkx --cov-branch \
            --ignore-glob=tests/test_fci_*.py \
            --ignore-glob=tests/test_mms_shifted_torus_*.py \
            --ignore-glob=tests/test_mms_slab_*.py \
            --ignore-glob=tests/test_multigrid_*.py \
            --ignore-glob=tests/test_shifted_torus_*.py
          pytest -q -m "not slow" --cov=dkx --cov-branch --cov-append \
            tests/test_fci_halo.py \
            tests/test_fci_model_state.py \
            tests/test_fci_operators.py \
            tests/test_fci_operators_domain_decomp.py \
            tests/test_mms_shifted_torus_EB.py \
            tests/test_multigrid_preconditioner.py \
            tests/test_shifted_torus_EB_blob.py
          coverage report
