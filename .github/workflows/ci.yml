name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test (py${{ matrix.python-version }} • ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          git clone --depth 1 https://github.com/uwplasma/essos.git
          python -m pip install -e essos

      - name: Lint
        run: |
          ruff check src tests examples
          black --check src tests examples

      - name: Test
        run: python -m pytest -q

      - name: Performance gate (core kernels)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python benchmarks/check_core_kernels.py \
            --min-hw2d-steps-s 8 \
            --min-matvec-s 120 \
            --json-out out/ci/perf_metrics.json

      - name: Physics gate (cold-ion DRB conservative operator)

      - name: Physics gate (hot-ion/EM DRB mean invariants)

      - name: Physics gate (DRB2D conservative energy)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python benchmarks/check_drb2d_conservative_gate.py \
            --max-rel-span 5e-4 \
            --max-rel-end 5e-4 \
            --json-out out/ci/drb2d_gate.json
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python benchmarks/check_drb_hot_em_split_gate.py \
            --max-abs-mean-dt 1e-11 \
            --json-out out/ci/drb_hot_em_gate.json
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python benchmarks/check_drb_conservative_gate.py \
            --max-abs-denergy-dt 5e-8 \
            --max-abs-dmean-dt 1e-11 \
            --max-rel-energy-span 3e-4 \
            --max-rel-energy-end 3e-4 \
            --max-abs-mean-drift 5e-10 \
            --json-out out/ci/drb_conservative_metrics.json

  build:
    name: Build (sdist/wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build

  docs:
    name: Docs (mkdocs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build docs
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
          mkdocs build --strict
