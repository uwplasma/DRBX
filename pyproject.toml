[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jax-drb"
version = "1.0.0"
description = "Fresh JAX edge/SOL plasma code with differentiable, hardware-agnostic solver infrastructure."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["jax>=0.7", "rich>=13.9"]

[project.optional-dependencies]
dev = ["pytest>=8.4", "pytest-cov>=5.0"]
integrators = ["diffrax>=0.7", "scipy>=1.14"]
models = ["equinox>=0.13"]
validation = ["matplotlib>=3.9", "netCDF4>=1.7"]

[project.scripts]
jax-drb = "jax_drb.cli:main"
jax_drb = "jax_drb.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
"jax_drb.data.atomic_rates" = ["*.json"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: longer-running solver or history tests that are excluded from the default fast research gate",
]

[tool.coverage.run]
branch = true
source = ["src/jax_drb"]

[tool.coverage.report]
show_missing = true
skip_covered = false
