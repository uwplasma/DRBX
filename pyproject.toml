[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jax-drb"
version = "0.1.0"
description = "Fresh JAX edge/SOL plasma code with differentiable, hardware-agnostic solver infrastructure."
readme = "PLAN.md"
requires-python = ">=3.11"
dependencies = ["jax>=0.7"]

[project.optional-dependencies]
dev = ["pytest>=8.4"]
integrators = ["diffrax>=0.7"]
models = ["equinox>=0.13"]
validation = ["matplotlib>=3.9", "netCDF4>=1.7"]

[project.scripts]
jax-drb = "jax_drb.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
